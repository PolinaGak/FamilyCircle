services:
  db:
    container_name: postgres_family_circle
    image: postgres:15-alpine
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-family_circle}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - family_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - family_network

  migrate:
    build: ./backend
    env_file:
      - .env.prod
    command: alembic -c backend/alembic.ini upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db/${POSTGRES_DB:-family_circle}
    restart: "no"
    networks:
      - family_network

  backend:
    build: ./backend
    container_name: family_circle_backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 2
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - family_network

  nginx:
    image: nginx:alpine
    container_name: family_circle_nginx
    ports:
      - "80:80"
      # - "443:443"  # раскомментировать когда настроите SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - family_network

  frontend:
    build: ./frontend
    container_name: family_circle_frontend
    expose:
      - "3000"
    environment:
       - REACT_APP_API_URL=/api
    restart: unless-stopped
    networks:
      - family_network

  celery_worker:
    build: ./backend
    command: celery -A backend.app.core.celery worker --loglevel=info
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - family_network

  celery_beat:
    build: ./backend
    command: celery -A backend.app.core.celery beat --loglevel=info
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - family_network

volumes:
  postgres_data:

networks:
  family_network: